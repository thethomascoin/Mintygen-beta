kind = "mobile"
previewPath = "/"
title = "UGC Pilot"
version = "1.0.0"
id = "artifacts/ugc-pilot"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21248

[services.development]
run = "pnpm --filter @workspace/ugc-pilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ugc-pilot", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ugc-pilot", "run", "serve" ]

[services.env]
PORT = "21248"
BASE_PATH = "/"
